services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: iamjos-app
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-iamjos}
      - DB_USERNAME=${DB_USERNAME:-iamjos}
      - DB_PASSWORD=${DB_PASSWORD:-iamjos}
    depends_on:
      - db
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/up"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE:-iamjos}
      POSTGRES_USER: ${DB_USERNAME:-iamjos}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-iamjos}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
